<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380">
  <defs>
    <linearGradient id="devBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f0a2e"/>
      <stop offset="100%" stop-color="#1a1145"/>
    </linearGradient>
    <linearGradient id="devHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <filter id="devShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="960" height="380" fill="url(#devBg)" rx="8"/>

  <!-- Title -->
  <rect x="0" y="0" width="960" height="44" rx="8" fill="url(#devHeader)"/>
  <text x="480" y="28" text-anchor="middle" font-family="'SF Pro Display','Inter',sans-serif" font-size="14" font-weight="700" fill="#e2e8f0" letter-spacing="3">iPHONE + APPLE WATCH COORDINATION</text>

  <!-- Watch Card -->
  <g transform="translate(30, 65)" filter="url(#devShadow)">
    <rect width="280" height="280" rx="8" fill="#111827" stroke="#34a853" stroke-width="1"/>
    <rect width="280" height="28" rx="8" fill="#14532d"/>
    <rect y="20" width="280" height="8" fill="#14532d"/>

    <!-- Watch icon -->
    <rect x="12" y="6" width="13" height="16" rx="4" fill="none" stroke="#6ee7b7" stroke-width="1.2"/>
    <text x="32" y="19" font-family="'SF Pro Text',sans-serif" font-size="10" font-weight="700" fill="#6ee7b7">Apple Watch</text>

    <!-- Modules -->
    <g transform="translate(15, 38)">
      <rect width="250" height="40" rx="5" fill="#0c1f3d" stroke="#34a853" stroke-width="0.8"/>
      <text x="125" y="16" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#34a853" font-weight="600">WorkoutManager (HKWorkoutSession)</text>
      <text x="125" y="30" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">Heart rate sampling every 1-5 seconds (vs 5-15 min at rest)</text>
    </g>
    <g transform="translate(15, 85)">
      <rect width="120" height="40" rx="5" fill="#0c1f3d" stroke="#fbbc04" stroke-width="0.8"/>
      <text x="60" y="16" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#fbbc04" font-weight="600">Motion (10 Hz)</text>
      <text x="60" y="30" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">Pitch · Roll · Yaw</text>
    </g>
    <g transform="translate(145, 85)">
      <rect width="120" height="40" rx="5" fill="#0c1f3d" stroke="#a78bfa" stroke-width="0.8"/>
      <text x="60" y="16" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#a78bfa" font-weight="600">Stability Score</text>
      <text x="60" y="30" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">Accel variance → 0-1</text>
    </g>
    <g transform="translate(15, 132)">
      <rect width="120" height="40" rx="5" fill="#0c1f3d" stroke="#06b6d4" stroke-width="0.8"/>
      <text x="60" y="16" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#06b6d4" font-weight="600">Compass</text>
      <text x="60" y="30" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">Heading + Accuracy</text>
    </g>
    <g transform="translate(145, 132)">
      <rect width="120" height="40" rx="5" fill="#0c1f3d" stroke="#ec4899" stroke-width="0.8"/>
      <text x="60" y="16" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#ec4899" font-weight="600">HealthKit</text>
      <text x="60" y="30" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">SpO2 · Noise dB</text>
    </g>

    <!-- Delivery mode -->
    <g transform="translate(15, 185)">
      <rect width="250" height="50" rx="5" fill="#1e1b4b" stroke="#34a853" stroke-width="1"/>
      <text x="125" y="16" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#6ee7b7" font-weight="600">PhoneConnector (WCSession)</text>
      <text x="125" y="32" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">Realtime: sendMessage() → &lt;1s latency</text>
      <text x="125" y="44" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">Fallback: transferUserInfo() → queued</text>
    </g>

    <!-- Data payload label -->
    <text x="140" y="260" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#64748b">{heartRate, motion, heading, spO2, noise}</text>
  </g>

  <!-- Connection Arrow (Watch → Phone) -->
  <g transform="translate(315, 140)">
    <line x1="0" y1="70" x2="70" y2="70" stroke="#34a853" stroke-width="2.5"/>
    <polygon points="65,64 75,70 65,76" fill="#34a853"/>
    <text x="35" y="62" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#6ee7b7" font-weight="600">&lt;1 sec</text>
    <text x="35" y="85" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#64748b">WCSession</text>
  </g>

  <!-- iPhone Card -->
  <g transform="translate(390, 65)" filter="url(#devShadow)">
    <rect width="280" height="280" rx="8" fill="#111827" stroke="#4285f4" stroke-width="1"/>
    <rect width="280" height="28" rx="8" fill="#1e3a5f"/>
    <rect y="20" width="280" height="8" fill="#1e3a5f"/>

    <!-- Phone icon -->
    <rect x="12" y="6" width="10" height="16" rx="2" fill="none" stroke="#93c5fd" stroke-width="1.2"/>
    <text x="30" y="19" font-family="'SF Pro Text',sans-serif" font-size="10" font-weight="700" fill="#93c5fd">iPhone — SensorManager</text>

    <!-- Watch data receiver -->
    <g transform="translate(15, 38)">
      <rect width="250" height="35" rx="5" fill="#0c1f3d" stroke="#34a853" stroke-width="0.8"/>
      <text x="125" y="14" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#34a853" font-weight="600">WatchReceiver (WCSession Listener)</text>
      <text x="125" y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">Merge watch context into telemetry · Staleness: 30s</text>
    </g>

    <!-- Phone-native sensors -->
    <g transform="translate(15, 82)">
      <rect width="120" height="35" rx="5" fill="#0c1f3d" stroke="#4285f4" stroke-width="0.8"/>
      <text x="60" y="14" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#4285f4" font-weight="600">GPS + Compass</text>
      <text x="60" y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">CLLocationManager</text>
    </g>
    <g transform="translate(145, 82)">
      <rect width="120" height="35" rx="5" fill="#0c1f3d" stroke="#fbbc04" stroke-width="0.8"/>
      <text x="60" y="14" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#fbbc04" font-weight="600">Motion + Pedometer</text>
      <text x="60" y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">CMMotionActivity</text>
    </g>
    <g transform="translate(15, 125)">
      <rect width="120" height="35" rx="5" fill="#0c1f3d" stroke="#ea4335" stroke-width="0.8"/>
      <text x="60" y="14" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#ea4335" font-weight="600">Camera + Depth</text>
      <text x="60" y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">CoreML · DepthV2</text>
    </g>
    <g transform="translate(145, 125)">
      <rect width="120" height="35" rx="5" fill="#0c1f3d" stroke="#ec4899" stroke-width="0.8"/>
      <text x="60" y="14" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#ec4899" font-weight="600">Audio + VAD</text>
      <text x="60" y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">Silero · Barge-in</text>
    </g>

    <!-- Aggregator -->
    <g transform="translate(15, 172)">
      <rect width="250" height="40" rx="5" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
      <text x="125" y="16" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#c4b5fd" font-weight="600">TelemetryAggregator (LOD-Aware)</text>
      <text x="125" y="30" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">LOD1: 3-4s · LOD2: 2-3s · LOD3: 5-10s + immediate triggers</text>
    </g>

    <!-- Output -->
    <g transform="translate(15, 225)">
      <rect width="250" height="32" rx="5" fill="#0c1f3d" stroke="#10b981" stroke-width="1"/>
      <text x="125" y="14" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#10b981" font-weight="600">Fused TelemetryData Payload</text>
      <text x="125" y="26" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">motion + gps + HR + depth + weather + watch data</text>
    </g>
  </g>

  <!-- Arrow (Phone → Server) -->
  <g transform="translate(675, 140)">
    <line x1="0" y1="70" x2="70" y2="70" stroke="#4285f4" stroke-width="2.5"/>
    <polygon points="65,64 75,70 65,76" fill="#4285f4"/>
    <text x="35" y="62" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#93c5fd" font-weight="600">WebSocket</text>
    <text x="35" y="85" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#64748b">Binary + JSON</text>
  </g>

  <!-- Server Card -->
  <g transform="translate(755, 65)" filter="url(#devShadow)">
    <rect width="175" height="280" rx="8" fill="#111827" stroke="#7c3aed" stroke-width="1"/>
    <rect width="175" height="28" rx="8" fill="#312e81"/>
    <rect y="20" width="175" height="8" fill="#312e81"/>

    <text x="87" y="19" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="10" font-weight="700" fill="#c4b5fd">Cloud Run</text>

    <g transform="translate(12, 38)">
      <rect width="150" height="30" rx="4" fill="#0c1f3d" stroke="#4285f4" stroke-width="0.6"/>
      <text x="75" y="13" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#4285f4" font-weight="600">Orchestrator</text>
      <text x="75" y="24" text-anchor="middle" font-family="'Courier New',monospace" font-size="6" fill="#64748b">Gemini Live API</text>
    </g>
    <g transform="translate(12, 75)">
      <rect width="150" height="25" rx="4" fill="#0c1f3d" stroke="#34a853" stroke-width="0.6"/>
      <text x="75" y="16" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#34a853" font-weight="600">Vision · OCR · Face</text>
    </g>
    <g transform="translate(12, 107)">
      <rect width="150" height="25" rx="4" fill="#0c1f3d" stroke="#06b6d4" stroke-width="0.6"/>
      <text x="75" y="16" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#06b6d4" font-weight="600">LOD Engine</text>
    </g>
    <g transform="translate(12, 139)">
      <rect width="150" height="25" rx="4" fill="#0c1f3d" stroke="#ec4899" stroke-width="0.6"/>
      <text x="75" y="16" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#ec4899" font-weight="600">Memory + Entities</text>
    </g>
    <g transform="translate(12, 171)">
      <rect width="150" height="25" rx="4" fill="#0c1f3d" stroke="#f59e0b" stroke-width="0.6"/>
      <text x="75" y="16" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#f59e0b" font-weight="600">Navigation Tools</text>
    </g>

    <!-- Return arrow -->
    <g transform="translate(12, 210)">
      <rect width="150" height="45" rx="5" fill="#1e1b4b" stroke="#10b981" stroke-width="0.8"/>
      <text x="75" y="15" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#10b981" font-weight="600">Response Stream</text>
      <text x="75" y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">Audio (24kHz) +</text>
      <text x="75" y="39" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#94a3b8">Context tags + LOD</text>
    </g>
  </g>
</svg>